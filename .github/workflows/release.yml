name: Release

on:
  push:
    branches: [main]
    paths:
      - '.changeset/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - run: pnpm changeset status

      - id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          setupGitUser: false
        env:
          # Default GITHUB_TOKEN works for opening the Version Packages PR
          # and pushing commits within this repo. Caveat: bot-pushed commits
          # do not auto-trigger CI runs — re-trigger via gh workflow run if
          # needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Verify published version matches source
        if: steps.changesets.outputs.published == 'true'
        run: |
          sleep 10
          NPM_VERSION=$(npm view @lightfastai/ai-sdk version)
          SRC_VERSION=$(node -p "require('./package.json').version")
          echo "npm=$NPM_VERSION src=$SRC_VERSION"
          if [ "$NPM_VERSION" != "$SRC_VERSION" ]; then
            echo "::error::Published npm version ($NPM_VERSION) does not match source ($SRC_VERSION)"
            exit 1
          fi
          echo "✅ @lightfastai/ai-sdk@$NPM_VERSION published"
